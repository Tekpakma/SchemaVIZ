<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="100%" height="100%">
  <style>
    /* The whole helicopter floating up and down */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    
    /* Spinning the tail rotor */
    @keyframes spinTail {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Simulating a 3D spin for the top rotor in a 2D side-view */
    @keyframes spinMain {
      0% { transform: scaleX(1); }
      50% { transform: scaleX(0.1); }
      100% { transform: scaleX(1); }
    }

    .heli {
      animation: float 3s ease-in-out infinite;
    }
    
    .tail-rotor {
      transform-origin: 175px 60px;
      animation: spinTail 0.2s linear infinite;
    }
    
    .main-rotor {
      transform-origin: 85px 25px;
      animation: spinMain 0.15s linear infinite;
    }
  </style>

  <g class="heli">
    <line x1="60" y1="125" x2="60" y2="150" stroke="#888" stroke-width="4" stroke-linecap="round"/>
    <line x1="110" y1="125" x2="110" y2="150" stroke="#888" stroke-width="4" stroke-linecap="round"/>
    <line x1="30" y1="150" x2="140" y2="150" stroke="#888" stroke-width="6" stroke-linecap="round"/>

    <path d="M 135 80 L 175 70 L 175 60 L 135 65 Z" fill="#4f7942"/>
    <polygon points="170,70 185,70 180,50 170,50" fill="#4f7942"/>

    <g class="tail-rotor">
      <line x1="175" y1="45" x2="175" y2="75" stroke="#333" stroke-width="3" stroke-linecap="round"/>
      <line x1="160" y1="60" x2="190" y2="60" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    </g>

    <ellipse cx="85" cy="85" rx="55" ry="45" fill="#ffffff" />

    <path d="M 30 85 A 55 45 0 0 0 140 85 Z" fill="#4f7942" />

    <line x1="30" y1="85" x2="140" y2="85" stroke="#111" stroke-width="4"/>
    <rect x="75" y="81" width="12" height="8" fill="#ffd700" stroke="#111" stroke-width="2" rx="2"/>

    <circle cx="45" cy="65" r="18" fill="#f5d0b5" />

    <circle cx="34" cy="78" r="6" fill="#f5d0b5" stroke="#d4a373" stroke-width="1"/>
    <circle cx="46" cy="78" r="6" fill="#f5d0b5" stroke="#d4a373" stroke-width="1"/>

    <circle cx="38" cy="60" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
    <circle cx="54" cy="60" r="7" fill="#fff" stroke="#111" stroke-width="2"/>
    <line x1="45" y1="60" x2="47" y2="60" stroke="#111" stroke-width="2"/>

    <rect x="82" y="25" width="6" height="16" fill="#888"/>

    <g class="main-rotor">
      <line x1="15" y1="25" x2="155" y2="25" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    </g>
    <circle cx="85" cy="25" r="4" fill="#111"/>
  </g>
</svg>